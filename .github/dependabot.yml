version: 2
updates:
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 8
    groups:
      frontend-dev:
        patterns:
          - "@types/*"
          - "*eslint*"
          - "@typescript-eslint/*"
          - "jest*"
          - "ts-jest"
          - "@testing-library/*"

  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 6

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
