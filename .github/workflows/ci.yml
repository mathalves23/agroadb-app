name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  backend:
    name: Backend (lint + testes)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: agroadb
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: agroadb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Validar regras Prometheus (promtool)
        run: |
          docker run --rm --entrypoint promtool \
            -v "${GITHUB_WORKSPACE}/monitoring/alerts:/rules:ro" \
            prom/prometheus:v2.53.3 \
            check rules /rules/agroadb.yml

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependências
        env:
          PIP_INDEX_URL: https://pypi.org/simple
        run: pip install -r backend/requirements.txt

      - name: pip-audit (dependências Python)
        env:
          PIP_INDEX_URL: https://pypi.org/simple
        run: |
          pip install "pip-audit>=2.7,<3"
          pip-audit -r backend/requirements.txt --desc on

      # Política: CI verde = barra mínima (subconjunto). Suíte completa: workflow noturno nightly-backend-full-suite.yml + pytest tests/ local.
      # Segredos opcionais (repo/fork sem secrets usa os defaults abaixo). Ver docs/dev/github-setup.md
      - name: Backend check (Makefile alinhado ao ambiente local)
        env:
          _CI_DATABASE_URL: ${{ secrets.CI_DATABASE_URL }}
          _CI_REDIS_URL: ${{ secrets.CI_REDIS_URL }}
          _CI_SECRET_KEY: ${{ secrets.CI_SECRET_KEY }}
          _CI_ENCRYPTION_KEY: ${{ secrets.CI_ENCRYPTION_KEY }}
          # Serviço redis:7 no job — exige gauges de fila em GET /metrics (test_observability).
          AGROADB_CI_QUEUE_METRICS: "1"
        run: |
          export DATABASE_URL="${_CI_DATABASE_URL:-postgresql+asyncpg://agroadb:test_password@localhost:5432/agroadb_test}"
          export REDIS_URL="${_CI_REDIS_URL:-redis://localhost:6379/0}"
          export SECRET_KEY="${_CI_SECRET_KEY:-ci-test-secret-key-at-least-32-chars-long}"
          export ENCRYPTION_KEY="${_CI_ENCRYPTION_KEY:-MDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDA=}"
          make backend-check

      - name: Upload cobertura (opcional)
        uses: codecov/codecov-action@v6
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  frontend:
    name: Frontend (lint + types + build + testes)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        run: npm ci
        working-directory: frontend

      # xlsx (SheetJS community) não tem patch npm para avisos high; falhamos apenas em critical.
      - name: npm audit (produção, severidade critical)
        run: npm audit --omit=dev --audit-level=critical --registry=https://registry.npmjs.org/
        working-directory: frontend

      - run: npm run lint
        working-directory: frontend

      - run: npm run type-check
        working-directory: frontend

      - name: Manual de produto (fonte única em product/)
        run: npm run check-product-manual
        working-directory: frontend

      - run: npm run build
        working-directory: frontend

      - run: npm run test:ci
        working-directory: frontend

      - run: npm run coverage:critical
        working-directory: frontend

  e2e:
    name: Frontend (Playwright E2E)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        run: npm ci
        working-directory: frontend

      - name: Instalar browsers Playwright
        run: npx playwright install chromium --with-deps
        working-directory: frontend

      - name: E2E (críticos + manual /guide, API mockada)
        run: npm run test:e2e:ci
        working-directory: frontend
