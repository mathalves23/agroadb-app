# Prometheus — AgroADB (compose com profile `obs`)
# Targets usam nomes de serviço Docker na rede do projecto.

global:
  scrape_interval: 15s
  evaluation_interval: 30s
  external_labels:
    cluster: agroadb
    environment: docker-compose

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - /etc/prometheus/alerts/agroadb.yml

scrape_configs:
  - job_name: agroadb-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]
        labels:
          service: api

  - job_name: agroadb-celery-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["celery-worker:9464"]
        labels:
          service: celery-worker

  # --- Opcional: activar quando tiver exporters na mesma rede ---
  # - job_name: postgres
  #   static_configs:
  #     - targets: ["postgres-exporter:9187"]
