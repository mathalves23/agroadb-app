# Prometheus — AgroADB (perfil Docker `obs`)
# Todos os targets estão na rede `agroadb_net` (resolução DNS: backend, celery-worker, exporters).

global:
  scrape_interval: 15s
  evaluation_interval: 30s
  external_labels:
    cluster: agroadb
    environment: docker-compose

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alerts/agroadb.yml

scrape_configs:
  - job_name: agroadb-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]
        labels:
          service: api

  - job_name: agroadb-celery-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["celery-worker:9464"]
        labels:
          service: celery-worker

  - job_name: postgres-exporter
    metrics_path: /metrics
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: postgres

  - job_name: redis-exporter
    metrics_path: /metrics
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: redis
