# Alertmanager — AgroADB
# Requer --config.expand-env=true (ver docker-compose, perfil `obs`).
# Variáveis: SLACK_WEBHOOK_URL, PAGERDUTY_ROUTING_KEY, AM_EMAIL_TO, AM_SMTP_* (ver env.observability.example).

global:
  resolve_timeout: 5m
  smtp_smarthost: '${AM_SMTP_SMARTHOST}'
  smtp_from: '${AM_SMTP_FROM}'
  # Autenticação SMTP opcional: descomente e use expand-env se o relay exigir.
  # smtp_auth_username: '${AM_SMTP_USER}'
  # smtp_auth_password: '${AM_SMTP_PASS}'

route:
  receiver: email-oncall
  group_by: ['alertname', 'cluster', 'service', 'severity']
  group_wait: 45s
  group_interval: 5m
  repeat_interval: 12h
  routes:
    - matchers:
        - severity = "critical"
      receiver: critical-email-pagerduty
    - matchers:
        - severity =~ "warning|info"
      receiver: warning-email-slack

receivers:
  - name: email-oncall
    email_configs:
      - to: '${AM_EMAIL_TO}'
        send_resolved: true
        headers:
          Subject: '[AgroADB] {{ .CommonLabels.alertname }} ({{ .CommonLabels.severity }})'

  - name: critical-email-pagerduty
    email_configs:
      - to: '${AM_EMAIL_TO}'
        send_resolved: true
        headers:
          Subject: '[AgroADB][CRITICAL] {{ .CommonLabels.alertname }}'
    pagerduty_configs:
      - routing_key: '${PAGERDUTY_ROUTING_KEY}'
        send_resolved: true
        description: '{{ if .CommonAnnotations.description }}{{ .CommonAnnotations.description }}{{ else }}{{ .CommonAnnotations.summary }}{{ end }}'
        severity: critical

  - name: warning-email-slack
    email_configs:
      - to: '${AM_EMAIL_TO}'
        send_resolved: true
        headers:
          Subject: '[AgroADB][WARNING] {{ .CommonLabels.alertname }}'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        send_resolved: true
        title: 'AgroADB — {{ .CommonLabels.severity }}'
        title_link: '{{ .ExternalURL }}'
        text: >-
          {{ range .Alerts }}
          *{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          {{ end }}
