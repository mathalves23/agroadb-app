# Alertmanager — AgroADB
# Requer --config.expand-env=true (ver docker-compose, perfil `obs`).
# Defina SLACK_WEBHOOK_URL, PAGERDUTY_ROUTING_KEY, AM_EMAIL_TO e SMTP no ambiente.

global:
  resolve_timeout: 5m
  smtp_smarthost: '${AM_SMTP_SMARTHOST}'
  smtp_from: '${AM_SMTP_FROM}'
  smtp_auth_username: '${AM_SMTP_USER}'
  smtp_auth_password: '${AM_SMTP_PASS}'

route:
  receiver: email-oncall
  group_by: ['alertname', 'cluster', 'service', 'severity']
  group_wait: 45s
  group_interval: 5m
  repeat_interval: 12h
  routes:
    - matchers:
        - severity = "critical"
      receiver: critical-email-pagerduty
    - matchers:
        - severity =~ "warning|info"
      receiver: warning-email-slack

receivers:
  - name: email-oncall
    email_configs:
      - to: '${AM_EMAIL_TO}'
        send_resolved: true
        headers:
          Subject: '[AgroADB] {{ .CommonLabels.alertname }} ({{ .CommonLabels.severity }})'

  - name: critical-email-pagerduty
    email_configs:
      - to: '${AM_EMAIL_TO}'
        send_resolved: true
        headers:
          Subject: '[AgroADB][CRITICAL] {{ .CommonLabels.alertname }}'
    pagerduty_configs:
      - routing_key: '${PAGERDUTY_ROUTING_KEY}'
        send_resolved: true
        description: '{{ .CommonAnnotations.description }}'
        severity: critical
        details:
          firing: '{{ template "pagerduty.default.instances" .Alerts.Firing }}'
          num_firing: '{{ .Alerts.Firing | len }}'
          num_resolved: '{{ .Alerts.Resolved | len }}'

  - name: warning-email-slack
    email_configs:
      - to: '${AM_EMAIL_TO}'
        send_resolved: true
        headers:
          Subject: '[AgroADB][WARNING] {{ .CommonLabels.alertname }}'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        send_resolved: true
        title: 'AgroADB — {{ .CommonLabels.severity | toUpper }}'
        title_link: '{{ .ExternalURL }}'
        text: >-
          {{ range .Alerts }}
          *{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          {{ end }}

inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity =~ "warning|info"
    equal: ['alertname', 'cluster']
